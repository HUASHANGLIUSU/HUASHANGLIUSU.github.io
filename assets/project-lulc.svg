<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">LULC land cover classification map</title>
  <desc id="desc">A stylized satellite land-cover classification scene with fields, water, roads, and analysis panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#113a4e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#35d6ff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity=".2"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <g opacity=".18" stroke="#9fcdff">
    <path d="M0 90h960M0 180h960M0 270h960M0 360h960M0 450h960"/>
    <path d="M120 0v540M240 0v540M360 0v540M480 0v540M600 0v540M720 0v540M840 0v540"/>
  </g>
  <g transform="translate(72 70)">
    <rect width="500" height="360" rx="22" fill="#0d1b2e" stroke="#35d6ff" stroke-opacity=".36"/>
    <path d="M30 210c70-58 140-44 198-84 68-47 106-52 242-20v224H30z" fill="#2f8e5b"/>
    <path d="M30 70h170v115H30z" fill="#94b35b"/>
    <path d="M214 52h130v132H214z" fill="#d7b45a"/>
    <path d="M360 60h110v96H360z" fill="#7bb0cf"/>
    <path d="M58 242l220-170 210 130" fill="none" stroke="#f2f6ff" stroke-width="18" stroke-opacity=".74"/>
    <path d="M322 62c-8 70 18 122 84 156" fill="none" stroke="#35d6ff" stroke-width="18" stroke-opacity=".5"/>
    <g stroke="#06111f" stroke-opacity=".28" stroke-width="2">
      <path d="M30 70l440 260M30 210l440-104M200 70l24 260M344 52l-66 278"/>
    </g>
  </g>
  <g transform="translate(630 92)">
    <rect width="250" height="84" rx="18" fill="url(#panel)" stroke="#35d6ff" stroke-opacity=".45"/>
    <text x="24" y="36" fill="#edf6ff" font-family="Arial, sans-serif" font-size="20" font-weight="700">LULC Workflow</text>
    <text x="24" y="62" fill="#a9bad0" font-family="Arial, sans-serif" font-size="15">Image - Feature - Map</text>
  </g>
  <g transform="translate(640 220)" fill="none" stroke-linecap="round" stroke-width="14" filter="url(#glow)">
    <path d="M0 150l54-82 50 30 72-112 54 56" stroke="#35d6ff"/>
    <path d="M0 184h240" stroke="#9fcdff" stroke-opacity=".28"/>
  </g>
  <g transform="translate(646 410)" font-family="Arial, sans-serif" font-size="16" fill="#a9bad0">
    <circle cx="0" cy="0" r="7" fill="#94b35b"/><text x="18" y="6">Vegetation</text>
    <circle cx="122" cy="0" r="7" fill="#7bb0cf"/><text x="140" y="6">Water</text>
    <circle cx="0" cy="34" r="7" fill="#d7b45a"/><text x="18" y="40">Built-up / Soil</text>
  </g>
</svg>
